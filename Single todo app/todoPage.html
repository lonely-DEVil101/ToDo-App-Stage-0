<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="todoPage.css" />
    <title>To Do App</title>
</head>
<body>
    <main>
            <h2>Your Tasks</h2>
            <div data-testid="test-todo-task" id="todo-task">
                <h3 data-testid="test-todo-title" id="todo-title">Create todo App</h3>
                <p data-testid="test-todo-description" id="todo-description">This creates a simple to do app for hng internship</p>
                <div data-testid="test-todo-priority" id="todo-priority">
                    <div class="circle low"></div>
                    <div class="circle medium"></div>
                    <div class="circle high"></div>
                </div>
                <div data-testid="test-todo-due-date" id="todo-due-date">
                    <time><input type="datetime-local"/>    </time>
                    
                </div>
                <div data-testid="test-todo-time-remaining" id="todo-time-remaining"></div>
                <div data-testid="test-todo-status" id="todo-status"></div>
                <div data-testid="test-todo-complete-toggle" id="todo-complete-toggle"></div>
            </div>

        <dialog>
            <form id="task-form">
                <label for="task-title">Title:</label>
                <input type="text" id="task-title" name="task-title" />

                <label for="task-description">Description: </label>
                <textarea rows="5" cols="30" id="task-description" name="task-description" placeholder="Briefly describe your task here"></textarea>

                <label for="task-priority">Task Priority</label>
                <select id="task-priority" name="task-priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>

                <label for="dueDate">Deadline:</label>
                <input type="datetime-local" id="dueDate" name="dueDate">

                <label for="tags">Tags (comma separated)</label>
                <input
                type="text"
                id="tags"
                name="tags"
                placeholder="e.g. work, urgent, design"
                />

                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
                <button id="close-dialog" type="button">Close</button>
            </form>
        </dialog>
        <button id="add-new-task">Add New Task</button>
    </main>
</body>
<script src="todoPage.js"></script>
</html>
